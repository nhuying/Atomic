<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#18181b">
    <title>Atomic Habits Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .header-font { font-family: 'Playfair Display', sans-serif; }
        .habit-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .habit-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -2px rgb(0 0 0 / 0.05); }
        .streak-fire { animation: flame 1.5s infinite alternate; }
        @keyframes flame { from { transform: scale(1); } to { transform: scale(1.15); } }
        .completed { background: linear-gradient(135deg, #10b981, #34d399); }
        .failed { background: linear-gradient(135deg, #ef4444, #f87171); }
        .tooltip { position: relative; }
        .tooltip .tooltip-text { visibility: hidden; width: 160px; background-color: #27272a; color: #d4d4d8; text-align: center; border-radius: 6px; padding: 8px; position: absolute; z-index: 1; bottom: 125%; left: 50%; margin-left: -80px; opacity: 0; transition: opacity 0.3s; }
        .tooltip:hover .tooltip-text { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8">

        <div class="flex items-center justify-between mb-8 sticky top-0 bg-zinc-950/95 backdrop-blur-md z-10 py-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-2xl shadow-md shadow-emerald-500/30">
                    ⚛️
                </div>
                <div>
                    <h1 class="header-font text-3xl font-bold tracking-tight text-white">Atomic Habits</h1>
                    <p class="text-emerald-400 text-xs font-medium">ชีวิตดีขึ้น 1% ทุกวัน</p>
                </div>
            </div>
            
            <div id="identity-display" class="hidden items-center gap-3 bg-zinc-900 px-4 py-2 rounded-2xl border border-emerald-500/20">
                <span id="identity-text" class="text-lg font-semibold text-emerald-400"></span>
                <button onclick="editIdentity()" class="tooltip text-emerald-400 hover:text-emerald-300 transition-colors">
                    <i class="fa-solid fa-pen text-sm"></i>
                    <span class="tooltip-text">แก้ไขอัตลักษณ์</span>
                </button>
            </div>

            <div class="flex items-center gap-4 text-sm">
                <button onclick="showAddTaskModal()" class="tooltip flex items-center gap-1 text-zinc-300 hover:text-emerald-400 transition-colors">
                    <i class="fa-solid fa-plus"></i>
                    <span class="tooltip-text">สร้าง task ใหม่</span>
                </button>
                <button onclick="showWeeklyReflection()" class="tooltip flex items-center gap-1 text-zinc-300 hover:text-sky-400 transition-colors">
                    <i class="fa-solid fa-chart-line"></i>
                    <span class="tooltip-text">ทบทวนสัปดาห์</span>
                </button>
                <button onclick="resetAllData()" class="tooltip text-red-400 hover:text-red-500 transition-colors text-xs">
                    รีเซ็ต
                    <span class="tooltip-text">ลบข้อมูลทั้งหมด</span>
                </button>
                <input type="file" id="restore-file" accept=".json" class="hidden" onchange="restoreData(event)">

<button onclick="backupData()" class="tooltip text-sky-400 hover:text-sky-300 transition-colors text-xs">
    <i class="fa-solid fa-download"></i> Backup
    <span class="tooltip-text">เซฟข้อมูลลงเครื่อง</span>
</button>
<button onclick="document.getElementById('restore-file').click()" class="tooltip text-orange-400 hover:text-orange-300 transition-colors text-xs">
    <i class="fa-solid fa-upload"></i> Restore
    <span class="tooltip-text">ดึงข้อมูลกลับมา</span>
</button>
            </div>
        </div>

        <div id="onboarding-screen" class="max-w-md mx-auto">
            <div class="text-center py-12">
                <div class="mx-auto w-20 h-20 bg-gradient-to-br from-emerald-400 to-teal-500 rounded-2xl flex items-center justify-center text-5xl mb-6 shadow-lg">
                    🌱
                </div>
                <h2 class="text-4xl font-bold header-font mb-3">ยินดีต้อนรับ</h2>
                <p class="text-zinc-400 text-lg mb-8">บอกเราว่าคุณอยากเป็นใคร</p>
                
                <div class="bg-zinc-900 rounded-2xl p-6">
                    <label class="block text-xs font-medium text-zinc-400 mb-2 text-left">ฉันคือ...</label>
                    <input id="identity-input" type="text" placeholder="เช่น คนรักสุขภาพ, นักเขียน" class="w-full bg-zinc-800 border border-zinc-700 focus:border-emerald-500 rounded-xl px-4 py-3 text-lg outline-none transition-all">
                    
                    <div class="mt-6 grid grid-cols-2 gap-3 text-xs">
                        <button onclick="quickIdentity('คนรักสุขภาพ 💪')" class="bg-zinc-800 hover:bg-zinc-700 py-3 rounded-xl transition-colors">คนรักสุขภาพ 💪</button>
                        <button onclick="quickIdentity('นักเขียน ✍️')" class="bg-zinc-800 hover:bg-zinc-700 py-3 rounded-xl transition-colors">นักเขียน ✍️</button>
                    </div>
                    
                    <button onclick="saveIdentity()" class="mt-6 w-full bg-emerald-500 hover:bg-emerald-600 text-black font-semibold py-4 rounded-2xl text-lg transition-all active:scale-95">
                        เริ่มต้น →
                    </button>
                </div>
            </div>
        </div>

        <div id="dashboard-screen" class="hidden">
            <div class="bg-zinc-900 border border-emerald-500/20 rounded-2xl p-6 mb-8 text-center">
                <p class="text-emerald-400 text-sm font-medium">พลังสะสม 1% (Compound Effect)</p>
                <div id="compound-percent" class="text-4xl font-bold text-white mt-2">0%</div>
            </div>

            <div id="never-miss-banner" class="hidden bg-amber-900/30 border border-amber-500/30 text-amber-300 rounded-xl p-3 mb-6 flex items-center gap-3 text-sm">
                <i class="fa-solid fa-exclamation-triangle text-xl"></i>
                <div class="flex-1">
                    <p class="font-medium">อย่าพลาด 2 วันติด!</p>
                    <p class="text-xs">คุณพลาดเมื่อวาน มาทำวันนี้เลย</p>
                </div>
                <button onclick="scrollToHabits()" class="bg-amber-500/50 text-amber-100 px-4 py-2 rounded-xl font-medium hover:bg-amber-500/70 transition-colors">
                    ลงมือทำเลย
                </button>
            </div>

            <div class="mb-12">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-semibold">Habits (นิสัย)</h2>
                </div>
                <div id="habits-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div class="mb-12">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-semibold">Dailies (รายวัน)</h2>
                </div>
                <div id="dailies-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div class="mb-12">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-semibold">To-Dos (รายการทำ)</h2>
                </div>
                <div id="todos-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <div id="add-task-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-2xl max-w-md w-full mx-4 p-6 overflow-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold">สร้าง Task ใหม่</h3>
                <button onclick="hideAddTaskModal()" class="text-zinc-400 hover:text-white text-2xl">×</button>
            </div>
            <form id="task-form" onsubmit="handleAddTask(event)">
                <select id="task-type" class="w-full bg-zinc-800 border border-zinc-700 focus:border-emerald-500 rounded-xl px-4 py-3 mb-6 outline-none text-base">
                    <option value="habits">Habits (นิสัย)</option>
                    <option value="dailies">Dailies (รายวัน)</option>
                    <option value="todos">To-Dos (รายการทำ)</option>
                </select>
                <input type="text" id="task-name" required placeholder="ชื่อ task (เช่น ดื่มน้ำ 1 แก้ว)" class="w-full bg-zinc-800 border border-zinc-700 focus:border-emerald-500 rounded-xl px-4 py-3 mb-6 outline-none text-base">
                <div id="habit-polarity" class="mb-6 hidden">
                    <label class="block text-xs font-medium text-zinc-400 mb-2">ประเภท</label>
                    <select id="polarity" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none text-sm">
                        <option value="positive">(+) บวก</option>
                        <option value="negative">(-) ลบ</option>
                    </select>
                </div>
                <div id="daily-schedule" class="mb-6 hidden">
                    <label class="block text-xs font-medium text-zinc-400 mb-2">กำหนดวัน</label>
                    <input type="text" id="schedule" placeholder="เช่น ทุกวัน หรือ จันทร์-ศุกร์" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none text-sm">
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-bold py-4 rounded-2xl text-lg active:scale-95 transition-all">
                    บันทึก
                </button>
            </form>
        </div>
    </div>

    <script>
        let identity = localStorage.getItem('atomicIdentity') || '';
        let habits = JSON.parse(localStorage.getItem('atomicHabits')) || [];
        let dailies = JSON.parse(localStorage.getItem('atomicDailies')) || [];
        let todos = JSON.parse(localStorage.getItem('atomicTodos')) || [];

        function saveData() {
            localStorage.setItem('atomicIdentity', identity);
            localStorage.setItem('atomicHabits', JSON.stringify(habits));
            localStorage.setItem('atomicDailies', JSON.stringify(dailies));
            localStorage.setItem('atomicTodos', JSON.stringify(todos));
        }

        function getToday() {
            const now = new Date();
            return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        }

        function getYesterday() {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            return yesterday.getFullYear() + '-' + String(yesterday.getMonth()+1).padStart(2, '0') + '-' + String(yesterday.getDate()).padStart(2, '0');
        }

        // Identity functions
        function showOnboarding() {
            document.getElementById('onboarding-screen').classList.remove('hidden');
            document.getElementById('dashboard-screen').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('onboarding-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('identity-display').classList.remove('hidden');
            document.getElementById('identity-text').textContent = identity;
            renderAll();
        }

        function saveIdentity() {
            const input = document.getElementById('identity-input').value.trim();
            if (!input) return alert('กรุณากรอกอัตลักษณ์');
            identity = input;
            saveData();
            showDashboard();
        }

        function quickIdentity(text) {
            document.getElementById('identity-input').value = text;
        }

        function editIdentity() {
            const newId = prompt('อัตลักษณ์ใหม่:', identity);
            if (newId && newId.trim()) {
                identity = newId.trim();
                saveData();
                document.getElementById('identity-text').textContent = identity;
            }
        }

        // Calculations
        function calculateCompound() {
            let totalCompletions = 0;
            habits.forEach(h => totalCompletions += h.completedDates ? h.completedDates.length : 0);
            dailies.forEach(d => totalCompletions += d.completedDates ? d.completedDates.length : 0);
            todos.forEach(t => totalCompletions += t.completed ? 1 : 0);
            const percent = Math.pow(1.01, totalCompletions) - 1;
            document.getElementById('compound-percent').textContent = (percent * 100).toFixed(0) + '%';
        }

        function calculateMaxStreak(items) {
            let maxStreak = 0;
            items.forEach(item => {
                const dates = item.completedDates || [];
                if (dates.length === 0) return;
                const sorted = [...dates].sort();
                let current = 1;
                for (let i = 1; i < sorted.length; i++) {
                    const prev = new Date(sorted[i-1]);
                    const curr = new Date(sorted[i]);
                    if ((curr - prev) / (1000*60*60*24) === 1) {
                        current++;
                        maxStreak = Math.max(maxStreak, current);
                    } else {
                        current = 1;
                    }
                }
                maxStreak = Math.max(maxStreak, current);
            });
            return maxStreak;
        }

        function checkNeverMissTwice() {
            const banner = document.getElementById('never-miss-banner');
            const yesterday = getYesterday();
            const missedDailies = dailies.some(d => !d.completedDates || !d.completedDates.includes(yesterday));
            if (missedDailies && dailies.length > 0) {
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }
        }

        // Render Functions
        function renderHabits() {
            const grid = document.getElementById('habits-grid');
            grid.innerHTML = '';
            if (habits.length === 0) {
                grid.innerHTML = `<div class="text-center py-12 text-zinc-500"><div class="text-5xl mb-3">🌱</div><p class="text-lg">ยังไม่มี habits<br>สร้างใหม่เลย</p></div>`;
                return;
            }
            const today = getToday();
            habits.forEach((habit, index) => {
                if (!habit.completedDates) habit.completedDates = [];
                const isDoneToday = habit.completedDates.includes(today);
                const streak = calculateCurrentStreak(habit.completedDates);
                let daysHTML = '';
                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    const done = habit.completedDates.includes(dateStr);
                    daysHTML += `<div class="w-3 h-3 rounded-full ${done ? (habit.polarity === 'positive' ? 'bg-emerald-400' : 'bg-red-400') : 'bg-zinc-700'}"></div>`;
                }
                const card = document.createElement('div');
                card.className = `habit-card bg-zinc-900 border ${habit.polarity === 'positive' ? 'border-emerald-500/50' : 'border-red-500/50'} rounded-2xl p-4`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="text-lg font-semibold">${habit.name} (${habit.polarity === 'positive' ? '+' : '-'})</div>
                        </div>
                        <div onclick="toggleTask(${index}, 'habits')" class="w-10 h-10 rounded-xl flex items-center justify-center text-3xl cursor-pointer transition-all ${isDoneToday ? (habit.polarity === 'positive' ? 'completed' : 'failed') + ' scale-105' : 'bg-zinc-800 hover:bg-zinc-700'}">
                            ${isDoneToday ? (habit.polarity === 'positive' ? '✅' : '❌') : '⬜'}
                        </div>
                    </div>
                    <div class="flex gap-1 mb-4">${daysHTML}</div>
                    <div class="flex items-center justify-between text-xs">
                        <div class="flex items-center gap-1">
                            <span class="text-orange-400 text-lg">🔥</span>
                            <span class="font-bold">${streak}</span>
                            <span class="text-zinc-500">วัน</span>
                        </div>
                        <button onclick="deleteTask(${index}, 'habits'); event.stopImmediatePropagation()" class="text-red-400 hover:text-red-500 px-2 py-1 rounded-lg">
                            ลบ
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderDailies() {
            const grid = document.getElementById('dailies-grid');
            grid.innerHTML = '';
            if (dailies.length === 0) {
                grid.innerHTML = `<div class="text-center py-12 text-zinc-500"><div class="text-5xl mb-3">📅</div><p class="text-lg">ยังไม่มี dailies</p></div>`;
                return;
            }
            const today = getToday();
            dailies.forEach((daily, index) => {
                if (!daily.completedDates) daily.completedDates = [];
                const isDoneToday = daily.completedDates.includes(today);
                const streak = calculateCurrentStreak(daily.completedDates);
                let daysHTML = '';
                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    const done = daily.completedDates.includes(dateStr);
                    daysHTML += `<div class="w-3 h-3 rounded-full ${done ? 'bg-emerald-400' : 'bg-zinc-700'}"></div>`;
                }
                const card = document.createElement('div');
                card.className = `habit-card bg-zinc-900 border ${isDoneToday ? 'border-emerald-500/50' : 'border-zinc-700/50'} rounded-2xl p-4`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="text-lg font-semibold">${daily.name}</div>
                            <div class="text-zinc-400 text-xs mt-1">${daily.schedule || 'ทุกวัน'}</div>
                        </div>
                        <div onclick="toggleTask(${index}, 'dailies')" class="w-10 h-10 rounded-xl flex items-center justify-center text-3xl cursor-pointer transition-all ${isDoneToday ? 'completed scale-105' : 'bg-zinc-800 hover:bg-zinc-700'}">
                            ${isDoneToday ? '✅' : '⬜'}
                        </div>
                    </div>
                    <div class="flex gap-1 mb-4">${daysHTML}</div>
                    <div class="flex items-center justify-between text-xs">
                        <div class="flex items-center gap-1">
                            <span class="text-orange-400 text-lg">🔥</span>
                            <span class="font-bold">${streak}</span>
                            <span class="text-zinc-500">วัน</span>
                        </div>
                        <button onclick="deleteTask(${index}, 'dailies'); event.stopImmediatePropagation()" class="text-red-400 hover:text-red-500 px-2 py-1 rounded-lg">
                            ลบ
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderTodos() {
            const grid = document.getElementById('todos-grid');
            grid.innerHTML = '';
            if (todos.length === 0) {
                grid.innerHTML = `<div class="text-center py-12 text-zinc-500"><div class="text-5xl mb-3">📝</div><p class="text-lg">ยังไม่มี to-dos</p></div>`;
                return;
            }
            todos.forEach((todo, index) => {
                const card = document.createElement('div');
                card.className = `habit-card bg-zinc-900 border ${todo.completed ? 'border-emerald-500/50' : 'border-zinc-700/50'} rounded-2xl p-4`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="text-lg font-semibold ${todo.completed ? 'line-through text-zinc-500' : ''}">${todo.name}</div>
                        </div>
                        <div onclick="toggleTask(${index}, 'todos')" class="w-10 h-10 rounded-xl flex items-center justify-center text-3xl cursor-pointer transition-all ${todo.completed ? 'completed scale-105' : 'bg-zinc-800 hover:bg-zinc-700'}">
                            ${todo.completed ? '✅' : '⬜'}
                        </div>
                    </div>
                    <div class="flex items-center justify-end text-xs">
                        <button onclick="deleteTask(${index}, 'todos'); event.stopImmediatePropagation()" class="text-red-400 hover:text-red-500 px-2 py-1 rounded-lg">
                            ลบ
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function calculateCurrentStreak(dates) {
            if (!dates || dates.length === 0) return 0;
            const sorted = [...dates].sort().reverse();
            let streak = 0;
            let currentDate = new Date();
            for (let dateStr of sorted) {
                const d = new Date(dateStr);
                const diffDays = Math.floor((currentDate - d) / (1000*60*60*24));
                if (diffDays === streak) {
                    streak++;
                } else {
                    break;
                }
            }
            return streak;
        }

        function toggleTask(index, type) {
            let items;
            let datesKey = 'completedDates';
            
            if (type === 'todos') {
                todos[index].completed = !todos[index].completed;
                saveData();
                renderAll();
                return;
            }

            if (type === 'habits') items = habits;
            else if (type === 'dailies') items = dailies;
            
            const item = items[index];
            const today = getToday();
            if (!item[datesKey]) item[datesKey] = [];
            
            const isDone = item[datesKey].includes(today);
            if (isDone) {
                item[datesKey] = item[datesKey].filter(d => d !== today);
            } else {
                item[datesKey].push(today);
            }
            
            saveData();
            renderAll();
        }

        function deleteTask(index, type) {
            if (confirm('ลบ task นี้?')) {
                if (type === 'habits') habits.splice(index, 1);
                else if (type === 'dailies') dailies.splice(index, 1);
                else if (type === 'todos') todos.splice(index, 1);
                saveData();
                renderAll();
            }
        }

        // Modals
        function showAddTaskModal() {
            document.getElementById('add-task-modal').classList.remove('hidden');
            document.getElementById('task-form').reset();
            toggleTaskFields();
        }

        function hideAddTaskModal() {
            document.getElementById('add-task-modal').classList.add('hidden');
        }

        function toggleTaskFields() {
            const type = document.getElementById('task-type').value;
            document.getElementById('habit-polarity').classList.toggle('hidden', type !== 'habits');
            document.getElementById('daily-schedule').classList.toggle('hidden', type !== 'dailies');
        }

        document.getElementById('task-type').addEventListener('change', toggleTaskFields);

        function handleAddTask(e) {
            e.preventDefault();
            const type = document.getElementById('task-type').value;
            const name = document.getElementById('task-name').value.trim();
            if (!name) return;
            const newTask = {
                id: Date.now().toString(),
                name,
                completedDates: []
            };
            if (type === 'habits') {
                newTask.polarity = document.getElementById('polarity').value;
                habits.push(newTask);
            } else if (type === 'dailies') {
                newTask.schedule = document.getElementById('schedule').value.trim();
                dailies.push(newTask);
            } else if (type === 'todos') {
                newTask.completed = false;
                todos.push(newTask);
            }
            saveData();
            hideAddTaskModal();
            renderAll();
        }

        function showWeeklyReflection() {
            alert('📅 ทบทวนสัปดาห์: ดู streak และ progress ของคุณ');
        }

        function scrollToHabits() {

        }

            if (!identity) {
                showOnboarding();
            } else {
                showDashboard();
            }

        // ฟังก์ชันเซฟข้อมูลเป็นไฟล์ .json
function backupData() {
    const dataToSave = {
        identity: identity,
        habits: habits,
        dailies: dailies,
        todos: todos
    };
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataToSave));
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);
    downloadAnchorNode.setAttribute("download", "atomic_habits_backup_" + getToday() + ".json");
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
}

// ฟังก์ชันอ่านไฟล์ .json และกู้คืนข้อมูล
function restoreData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const parsedData = JSON.parse(e.target.result);
            if(confirm('ต้องการทับข้อมูลปัจจุบันด้วยไฟล์ Backup นี้ใช่หรือไม่?')) {
                // อัปเดตตัวแปร
                identity = parsedData.identity || '';
                habits = parsedData.habits || [];
                dailies = parsedData.dailies || [];
                todos = parsedData.todos || [];
                
                // เซฟลง LocalStorage และรีโหลดหน้า
                saveData();
                alert('กู้คืนข้อมูลสำเร็จ!');
                location.reload();
            }
        } catch (error) {
            alert('ไฟล์ไม่ถูกต้อง หรือเสียหาย');
        }
    };
    reader.readAsText(file);
    // เคลียร์ค่า input เผื่อต้องการอัปโหลดไฟล์เดิมซ้ำ
    event.target.value = '';
}
